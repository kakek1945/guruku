services:
  postgres:
    image: postgres:16-alpine
    container_name: guruku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guruku
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - guruku_postgres_data:/var/lib/postgresql/data

volumes:
  guruku_postgres_data:
